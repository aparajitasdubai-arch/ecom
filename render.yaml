services:
  - type: web
    name: novacart-ecommerce-demo
    runtime: static
    buildCommand: "true"
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /styles.css
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /script.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
